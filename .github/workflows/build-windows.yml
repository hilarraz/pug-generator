name: build-windows

# Builds the Windows executable on a GitHub-hosted Windows runner (which already
# has the gcc/mingw toolchain Fyne's cgo needs). Download the .exe from the run's
# "Artifacts" section. Runs on pushes to main/master and on manual dispatch.
on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    env:
      CGO_ENABLED: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # Fyne uses cgo; fail fast with a clear message if no C compiler is found.
      - name: Check C toolchain
        run: gcc --version

      - name: Test
        run: go test ./...

      # -H=windowsgui hides the console window behind the GUI.
      - name: Build Windows executable
        run: go build -trimpath -ldflags "-H=windowsgui" -o pug-generator.exe .

      - uses: actions/upload-artifact@v4
        with:
          name: pug-generator-windows-amd64
          path: pug-generator.exe
          if-no-files-found: error
